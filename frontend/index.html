<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Control de Asistencia</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Atrapador Global de Errores Visuales -->
    <script>
        // 1. Atrapa errores de ejecución de código (ej: una variable no definida)
        window.addEventListener('error', function(e) {
            const b = document.getElementById('modo-badge');
            if(b) b.textContent = '🔴 Error JS'; // Cambia el estado a rojo
            const l = document.getElementById('lista');
            if(l) l.innerHTML = '<div class="error-msg"><b>Error de Código:</b><br>' + e.message + '</div>';
        });

        // 2. Atrapa errores en peticiones de red o promesas fallidas (ej: fallo al conectar a tu API en Render)
        window.addEventListener('unhandledrejection', function(e) {
            const b = document.getElementById('modo-badge');
            if(b) b.textContent = '🔴 Promesa Rota';
            const l = document.getElementById('lista');
            if(l) l.innerHTML = '<div class="error-msg"><b>Error de Red/API:</b><br>' + (e.reason || 'Desconocido') + '</div>';
        });
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 16px 16px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 8px; }
        .modo-badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
        .header h1 { font-size: 1.1rem; margin-bottom: 2px; }
        .fecha { font-size: 0.8rem; opacity: 0.9; text-transform: capitalize; }
        .fecha-selector { background: white; padding: 12px 16px; border-bottom: 1px solid #e8e8e8; }
        .fecha-selector label { font-size: 0.7rem; font-weight: 700; color: #888; text-transform: uppercase; display: block; margin-bottom: 6px; }
        .fecha-row { display: flex; gap: 8px; }
        .fecha-row input { flex: 1; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.95rem; }
        .btn-hoy { padding: 10px 14px; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .solo-lectura { background: #fff3e0; color: #e65100; padding: 8px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; text-align: center; margin-top: 8px; display: none; }
        .filtros { display: flex; gap: 8px; padding: 10px 16px; background: white; border-bottom: 1px solid #e8e8e8; }
        .filtros select { flex: 1; padding: 10px 8px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.9rem; }
        .btn-cargar { padding: 10px 14px; background: #667eea; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .contador { display: flex; justify-content: space-around; padding: 10px; background: white; margin-top: 6px; border-bottom: 1px solid #e8e8e8; }
        .contador div { text-align: center; }
        .num { font-size: 1.4rem; font-weight: 700; display: block; }
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; }
        .presente { color: #4caf50; } .ausente { color: #f44336; } .tardanza { color: #ff9800; } .pendiente { color: #9e9e9e; } .justificado { color: #2196f3; } .excursion { color: #9c27b0; }
        .lista { padding: 8px 16px; padding-bottom: 100px; }
        .card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); opacity: 0.6; transition: opacity 0.2s; }
        .card.completo { opacity: 1; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card-header h3 { font-size: 0.95rem; font-weight: 700; }
        .card-header span { font-size: 0.78rem; color: #888; }
        .foto { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
        .estados { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .estados button { padding: 10px 2px; border: 2px solid #e8e8e8; border-radius: 10px; background: white; font-size: 0.7rem; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .estados button:active { transform: scale(0.95); }
        .estados button.sel-p { background: #4caf50; color: white; border-color: #4caf50; }
        .estados button.sel-a { background: #f44336; color: white; border-color: #f44336; }
        .estados button.sel-t { background: #ff9800; color: white; border-color: #ff9800; }
        .estados button.sel-j { background: #2196f3; color: white; border-color: #2196f3; }
        .estados button.sel-e { background: #9c27b0; color: white; border-color: #9c27b0; }
        .estados button:disabled { opacity: 0.5; cursor: not-allowed; }
        .acciones { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e8e8e8; padding: 12px 16px 24px; display: flex; gap: 10px; max-width: 430px; margin: 0 auto; }
        .acciones button { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
        .btn-guardar { background: linear-gradient(135deg, #4caf50, #45a049); color: white; }
        .btn-guardar:disabled { background: #ccc; }
        .btn-stats { background: #f0f0f0; color: #555; }
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 25px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 1000; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .error { text-align: center; padding: 40px; color: #f44336; }
        /* Mejorar respuesta táctil en móviles */
        .estados button {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        .estados button:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }
        /* 🔍 Barra de búsqueda */
        .busqueda-bar {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            background: white;
            border-bottom: 1px solid #e8e8e8;

        .busqueda-bar input {
            flex: 1;

            padding: 10px 14px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;

        .btn-todos-p:active { transform: scale(0.95); }
        .card.destacado {
            box-shadow: 0 0 0 2px #667eea, 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: scale(1.02);

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }

        /* 📊 Modal de reporte */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;

        .modal-header {

        .modal-header h2 { font-size: 1.1rem; color: #333; }
        .modal-close {
            background: none;

        }
        .modal-body { font-size: 0.9rem; }
        .reporte-filtros {

        .reporte-filtros input {

        .reporte-tabla {
            width: 100%;

        .reporte-tabla th {

        .reporte-tabla tr:hover { background: #f9f9f9; }
        .btn-modal {
            width: 100%;
            padding: 12px;

            color: white;

            border-radius: 10px;

        .btn-exportar {
            background: #4caf50;

        .estadistica-bar {
            display: flex;

        .est-p { background: #4caf50; }
        .est-a { background: #f44336; }
        .est-t { background: #ff9800; }
        .est-j { background: #2196f3; }
        .est-e { background: #9c27b0; }
        /* 📷 Input de archivo para justificación */
        .justificacion-input {
            display: none;

        .btn-adjuntar {
            font-size: 0.65rem;
            padding: 4px 8px;
            background: #f0f0f0;
            border: 1px solid #ddd;

        /* 📱 QR Scanner */
        .qr-overlay {

        }
        .qr-overlay.show { display: flex; }
        .qr-video {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
        }
        .qr-instructions {
            color: white;
            margin-top: 16px;

        .btn-cerrar-qr {
            margin-top: 20px;
            padding: 12px 24px;

            cursor: pointer;
            font-family: inherit;
        }
    </style>

<body>
    <div class="app">
        <header class="header">
            <div class="status-bar">
                <span id="hora">--:--</span>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button onclick="abrirQRScanner()" style="background:rgba(255,255,255,0.25);border:none;color:white;padding:4px 10px;border-radius:10px;font-size:0.7rem;cursor:pointer;font-weight:600;">📷 QR</button>
                    <span id="modo-badge" class="modo-badge">🟡 Conectando...</span>
                </div>
            </div>
            <h1>📚 Control de Asistencia</h1>
            <div class="fecha" id="fecha-display">Cargando...</div>
        </header>
        <div class="fecha-selector">
            <label>📅 Fecha de asistencia</label>
            <div class="fecha-row">
                <input type="date" id="fecha-input">
                <button class="btn-hoy" onclick="irAHoy()">Hoy</button>
            </div>
            <div class="solo-lectura" id="solo-lectura">👁️ Solo lectura</div>
        </div>
        <div class="filtros">
            <select id="grado"><option value="">Todos los grados</option></select>
            <select id="seccion"><option value="">Todas</option></select>
            <button class="btn-cargar" onclick="cargar()">Cargar</button>
        </div>
        <!-- 🔍 Barra de búsqueda -->
        <div class="busqueda-bar" id="busqueda-container" style="display:none;">
            <input type="text" id="busqueda-input" placeholder="🔍 Buscar alumno..." autocomplete="off">
            <button id="btn-todos-presentes" class="btn-todos-p">✅ Todos</button>
        </div>
        <div class="contador">
            <div><span class="num presente" id="c-p">0</span><span class="label">Presentes</span></div>
            <div><span class="num ausente" id="c-a">0</span><span class="label">Ausentes</span></div>
            <div><span class="num tardanza" id="c-t">0</span><span class="label">Tardanzas</span></div>
            <div><span class="num justificado" id="c-j">0</span><span class="label">Justificado</span></div>
            <div><span class="num excursion" id="c-e">0</span><span class="label">Excursión</span></div>
            <div><span class="num pendiente" id="c-pend">0</span><span class="label">Pendientes</span></div>
        </div>
        <div class="lista" id="lista"><div class="loading">Seleccioná grado/sección y tocá "Cargar"</div></div>
        <div class="acciones">
            <button class="btn-guardar" id="btn-guardar" onclick="guardar()">💾 Guardar</button>
            <button class="btn-stats" onclick="stats()">📊 Stats</button>
        </div>
        <div class="toast" id="toast"></div>
    </div>

    <!-- 📊 Modal de Reporte -->
    <div class="modal-overlay" id="modal-reporte">
        <div class="modal">
            <div class="modal-header">
                <h2>📊 Reporte de Asistencia</h2>
                <button class="modal-close" onclick="cerrarModal('modal-reporte')">✕</button>
            </div>
            <div class="modal-body">
                <div class="reporte-filtros">
                    <input type="date" id="reporte-desde" placeholder="Desde">
                    <input type="date" id="reporte-hasta" placeholder="Hasta">
                </div>
                <button class="btn-modal" onclick="generarReporte()">Generar Reporte</button>
                <button class="btn-modal btn-exportar" onclick="exportarCSV()">📥 Descargar CSV</button>
                <div id="reporte-contenido"></div>
            </div>
        </div>
    </div>

    <!-- 📷 Modal de Justificación -->
    <div class="modal-overlay" id="modal-justificacion">
        <div class="modal">
            <div class="modal-header">
                <h2>📝 Justificación</h2>
                <button class="modal-close" onclick="cerrarModal('modal-justificacion')">✕</button>
            </div>
            <div class="modal-body">
                <p id="justificacion-alumno" style="margin-bottom:12px;font-weight:700;"></p>
                <textarea id="justificacion-nota" placeholder="Motivo de la justificación..." style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-family:inherit;min-height:80px;resize:vertical;"></textarea>
                <input type="file" id="justificacion-archivo" class="justificacion-input" accept="image/*" onchange="previewArchivo(this)">
                <button class="btn-adjuntar" onclick="document.getElementById('justificacion-archivo').click()">📷 Adjuntar foto</button>
                <div id="justificacion-preview"></div>
                <button class="btn-modal" onclick="guardarJustificacion()">Guardar Justificación</button>
            </div>
        </div>
    </div>

    <!-- 📱 QR Scanner -->
    <div class="qr-overlay" id="qr-scanner">
        <video id="qr-video" class="qr-video" autoplay playsinline></video>
        <p class="qr-instructions">Escaneá el QR del alumno</p>
        <button class="btn-cerrar-qr" onclick="cerrarQR()">✕ Cerrar</button>
    </div>

    <script>
        // ===================== CONFIGURACIÓN ====================
        // ⚠️ IMPORTANTE: Cambiá esta URL por la de tu backend en Render
        const API = 'https://bot-proveedores-backend.onrender.com/api';
        const tg = window.Telegram.WebApp;
        let user = null;
        let alumnos = [];
        let fechaSel = new Date().toISOString().split('T')[0];
        let alumnoJustificacionId = null;
        let reporteData = [];

        const estados = {
            P: { icon: '✅', label: 'Presente', cls: 'sel-p' },
            A: { icon: '❌', label: 'Ausente', cls: 'sel-a' },
            T: { icon: '⏰', label: 'Tardanza', cls: 'sel-t' },
            J: { icon: '📝', label: 'Justificado', cls: 'sel-j' },
            E: { icon: '🚌', label: 'Excursión', cls: 'sel-e' }
        };

        // ==================== INICIALIZACIÓN ====================
        function init() {
            console.log('🚀 Iniciando Mini App...');
            tg.ready();
            tg.expand();
            actualizarHora();
            setInterval(actualizarHora, 1000);
            const inputFecha = document.getElementById('fecha-input');
            if (inputFecha) {
                inputFecha.value = fechaSel;
                inputFecha.addEventListener('change', function(e) {
                    fechaSel = e.target.value;
                    actualizarFecha();
                    cargar();
                });
            }
            actualizarFecha();

            const busquedaInput = document.getElementById('busqueda-input');
            if (busquedaInput) {
                busquedaInput.addEventListener('input', filtrarBusqueda);
            }

            const btnTodosP = document.getElementById('btn-todos-presentes');
            if (btnTodosP) {
                btnTodosP.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    marcarTodosPresentes();
                });
                btnTodosP.addEventListener('touchend', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    marcarTodosPresentes();
                }, {passive: false});
            }

            auth().then(() => {
                verificarConexion();
                cargarFiltros();
            }).catch(err => {
                console.error('Error init:', err);
                // Aun asi continuar
                verificarConexion();
                cargarFiltros();
            });
        }

        function actualizarHora() {
            const el = document.getElementById('hora');
            if (el) el.textContent = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
        }

        async function auth() {
            try {
                console.log('🔑 Autenticando...');
                const initData = tg.initData || '';

                // Si no hay initData (ej: abriendo desde navegador), modo dev
                if (!initData) {
                    console.warn('⚠️ No initData, modo desarrollo');
                    user = {id: 0, first_name: 'Modo Dev', username: 'dev'};
                    return;
                }

                const r = await fetch(`${API}/auth`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({initData: initData})
                });
                const d = await r.json();

                if (d.success) {
                    user = d.user;
                    console.log('✅ Autenticado:', user.first_name);
                } else {
                    console.warn('⚠️ Auth fallida:', d.message);
                    user = {id: 0, first_name: 'Modo Dev', username: 'dev'};
                }
            } catch (e) {
                console.error('❌ Auth error:', e);
                // NUNCA bloquear la app, usar modo dev
                user = {id: 0, first_name: 'Modo Dev', username: 'dev'};
            }
        }

        async function verificarConexion() {
            try {
                const r = await fetch(`${API}/`, {method: 'GET'});
                const d = await r.json();
                const badge = document.getElementById('modo-badge');
                if (badge) {
                    if (d.status === 'ok' || d.modo === 'online') {
                        badge.textContent = '🟢 Online';
                    } else {
                        badge.textContent = '🟡 Offline';
                    }
                }
                console.log('📡 Estado:', d);
            } catch (e) {
                console.error('❌ Sin conexión:', e);
                const badge = document.getElementById('modo-badge');
                if (badge) badge.textContent = '🔴 Sin conexión';
            }
        }

        function actualizarFecha() {
            const f = new Date(fechaSel + 'T00:00:00');
            const display = document.getElementById('fecha-display');
            if (display) display.textContent = f.toLocaleDateString('es-ES', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

            const hoyStr = new Date().toISOString().split('T')[0];

            const badge = document.getElementById('solo-lectura');
            const btn = document.getElementById('btn-guardar');
            if (!badge || !btn) return;
            if (fechaSel === hoyStr) {
                badge.style.display = 'none'; btn.disabled = false; btn.textContent = '💾 Guardar';
            } else if (fechaSel < hoyStr) {
                badge.style.display = 'block'; badge.textContent = '👁️ Cargando asistencia histórica';
                btn.disabled = false; btn.textContent = '💾 Cargar atrasado';
            } else {
                badge.style.display = 'block'; badge.textContent = '🔒 No se puede registrar asistencia futura';
                btn.disabled = true; btn.textContent = '🔒 Bloqueado';
            }
        }

        function irAHoy() {
            fechaSel = new Date().toISOString().split('T')[0];
            const input = document.getElementById('fecha-input');
            if (input) input.value = fechaSel;
            actualizarFecha();
            cargar();
        }

        async function cargarFiltros() {
            try {
                console.log('📥 Cargando filtros...');
                const r = await fetch(`${API}/alumnos`);
                const data = await r.json();
                const grados = [...new Set(data.map(a => a.grado))].sort();
                const secciones = [...new Set(data.map(a => a.seccion))].sort();
                const sg = document.getElementById('grado');
                const ss = document.getElementById('seccion');
                if (sg) grados.forEach(g => sg.add(new Option(g, g)));
                if (ss) secciones.forEach(s => ss.add(new Option('Sección ' + s, s)));
                console.log('✅ Filtros cargados');
            } catch (e) { console.error('❌ Error filtros:', e); }
        }

        async function cargar() {
            const g = document.getElementById('grado')?.value || '';
            const s = document.getElementById('seccion')?.value || '';
            const lista = document.getElementById('lista');
            lista.innerHTML = '<div class="loading">⏳ Cargando alumnos...</div>';

            const busquedaContainer = document.getElementById('busqueda-container');
            if (busquedaContainer) busquedaContainer.style.display = 'flex';
            try {
                console.log('📥 Cargando alumnos...');
                const params = new URLSearchParams();
                if (g) params.append('grado', g);
                if (s) params.append('seccion', s);
                const al = await (await fetch(`${API}/alumnos?${params}`)).json();
                const ap = new URLSearchParams();
                ap.append('fecha', fechaSel);
                if (g) ap.append('grado', g);
                if (s) ap.append('seccion', s);
                const asis = await (await fetch(`${API}/asistencia/hoy?${ap}`)).json();
                const asisMap = {};
                (asis.asistencia || []).forEach(a => { asisMap[a.alumno_id || a.id] = a.estado; });
                alumnos = al.map(a => ({...a, estado: asisMap[a.id] || null}));
                renderizar();
                contar();
                console.log('✅ Alumnos cargados:', alumnos.length);
            } catch (e) {
                console.error('❌ Error cargando:', e);
                mostrarError('Error: ' + e.message);
            }
        }

        function renderizar() {
            const container = document.getElementById('lista');
            if (!container) return;
            if (alumnos.length === 0) {
                container.innerHTML = '<div class="loading">No hay alumnos</div>';
                return;
            }
            container.innerHTML = '';
            alumnos.forEach((a, i) => {
                const ini = (a.nombre[0] + (a.apellido_paterno || a.apellido || '')[0]).toUpperCase();
                const card = document.createElement('div');
                card.className = 'card' + (a.estado ? ' completo' : '');
                card.style.animationDelay = (i * 0.03) + 's';

                const header = document.createElement('div');
                header.className = 'card-header';
                header.innerHTML = `<div><h3>${a.nombre} ${a.apellido_paterno||''} ${a.apellido_materno||''}</h3><span>Mat: ${a.matricula} · ${a.grado} ${a.seccion}</span></div><div class="foto">${ini}</div>`;

                const estadosDiv = document.createElement('div');
                estadosDiv.className = 'estados';

                ['P','A','T','J','E'].forEach(cod => {
                    const btn = document.createElement('button');
                    btn.innerHTML = `<span>${estados[cod].icon}</span><small>${estados[cod].label}</small>`;
                    btn.className = a.estado === cod ? estados[cod].cls : '';

                    const hoyStr = new Date().toISOString().split('T')[0];
                    if (fechaSel > hoyStr) btn.disabled = true;

                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        marcar(a.id, cod, this);
                    });

                    btn.addEventListener('touchend', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        marcar(a.id, cod, this);
                    }, {passive: false});

                    estadosDiv.appendChild(btn);
                });

                // Botón de justificación para estado J
                if (a.estado === 'J') {
                    const btnJust = document.createElement('button');
                    btnJust.className = 'btn-adjuntar';
                    btnJust.textContent = '📷 Justificación';
                    btnJust.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        abrirJustificacion(a.id);
                    });
                    estadosDiv.appendChild(btnJust);
                }

                card.appendChild(header);
                card.appendChild(estadosDiv);
                container.appendChild(card);
            });

            const busquedaTexto = document.getElementById('busqueda-input')?.value || '';
            if (busquedaTexto) filtrarBusqueda();
        }

        function marcar(id, estado, btn) {
            console.log('📱 marcar(', id, estado, ')');
            const a = alumnos.find(x => x.id === id);
            if (!a) return;
            a.estado = estado;
            const card = btn.closest('.card');
            if (card) {
                card.querySelectorAll('button').forEach(b => b.className = '');
                btn.classList.add(estados[estado].cls);
                card.classList.add('completo');
            }
            contar();
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function contar() {
            const p = alumnos.filter(a => a.estado === 'P').length;
            const au = alumnos.filter(a => a.estado === 'A').length;
            const t = alumnos.filter(a => a.estado === 'T').length;
            const j = alumnos.filter(a => a.estado === 'J').length;
            const e = alumnos.filter(a => a.estado === 'E').length;
            const pend = alumnos.filter(a => !a.estado).length;
            const ids = ['c-p','c-a','c-t','c-j','c-e','c-pend'];
            const vals = [p, au, t, j, e, pend];
            ids.forEach((id, idx) => {
                const el = document.getElementById(id);
                if (el) el.textContent = vals[idx];
            });
        }

        async function guardar() {
            const regs = alumnos.filter(a => a.estado).map(a => ({
                alumno_id: a.id, fecha: fechaSel, estado: a.estado,
                hora: new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'}),
                user_id: user?.id || 0
            }));
            if (!regs.length) { tg.showAlert('No hay asistencia para guardar'); return; }
            const btn = document.getElementById('btn-guardar');
            const orig = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ Guardando...';
            try {
                const r = await fetch(`${API}/asistencia/registrar`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({registros: regs, user_id: user?.id || 0})
                });
                const d = await r.json();
                const toast = document.getElementById('toast');
                if (toast) {
                    toast.textContent = d.modo === 'online' ? `✅ Guardado (${d.registros} registros)` : `💾 ${d.mensaje||'Guardado'}`;
                    toast.style.background = d.modo === 'online' ? '#1a1a1a' : '#ff9800';
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                }
                console.log('✅ Guardado:', d);
            } catch (e) {
                console.error('❌ Error guardando:', e);
                tg.showAlert('Error: ' + e.message);
            } finally {
                const btn = document.getElementById('btn-guardar');
                btn.disabled = false;
                btn.textContent = orig;
            }
        }

        function stats() {
            const p = alumnos.filter(a => a.estado === 'P').length;
            const au = alumnos.filter(a => a.estado === 'A').length;
            const t = alumnos.filter(a => a.estado === 'T').length;
            const j = alumnos.filter(a => a.estado === 'J').length;
            const e = alumnos.filter(a => a.estado === 'E').length;
            const total = alumnos.length;
            const ft = document.getElementById('fecha-display')?.textContent || fechaSel;
            tg.showAlert(`📊 ${ft}\n\n✅ Presentes: ${p}\n❌ Ausentes: ${au}\n⏰ Tardanzas: ${t}\n📝 Justificados: ${j}\n🚌 Excursiones: ${e}\n\nTotal: ${total} alumnos`);
        }

        function mostrarError(msg) {
            const lista = document.getElementById('lista');
            if (lista) lista.innerHTML = `<div class="error">${msg}</div>`;
        }

        // 🔍 Filtrar alumnos por búsqueda
        function filtrarBusqueda() {
            const texto = document.getElementById('busqueda-input').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const nombre = card.querySelector('h3')?.textContent.toLowerCase() || '';
                const matricula = card.querySelector('span')?.textContent.toLowerCase() || '';

                if (texto === '' || nombre.includes(texto) || matricula.includes(texto)) {
                    card.style.display = '';
                    card.classList.remove('destacado');
                } else {
                    card.style.display = 'none';
                }
            });

            if (texto.length > 0) {
                const visibles = document.querySelectorAll('.card:not([style*="none"])');
                if (visibles.length === 1) {
                    visibles[0].classList.add('destacado');
                }
            }
        }

        // ✅ Marcar todos como presentes (con confirmación)
        let marcandoTodos = false;

        function marcarTodosPresentes() {
            if (marcandoTodos) return;
            marcandoTodos = true;

            const hoyStr = new Date().toISOString().split('T')[0];

            if (fechaSel > hoyStr) {
                tg.showAlert('No se puede marcar asistencia futura');
                marcandoTodos = false;
                return;
            }

            const yaMarcados = alumnos.filter(a => a.estado).length;
            const pendientes = alumnos.filter(a => !a.estado).length;

            if (yaMarcados > 0 && pendientes === 0) {
                tg.showConfirm(
                    'Todos los alumnos ya tienen asistencia marcada (' + yaMarcados + '). ¿Querés sobreescribir TODOS como Presente?',
                    function(confirmado) {
                        if (confirmado) {
                            ejecutarMarcarTodosPresentes(true);
                        } else {
                            marcandoTodos = false;
                        }
                    }
                );
            } else if (yaMarcados > 0 && pendientes > 0) {
                tg.showConfirm(
                    'Ya hay ' + yaMarcados + ' alumnos marcados y ' + pendientes + ' pendientes. ¿Marcar TODOS como Presente (sobreescribiendo los ya marcados)?',
                    function(confirmado) {
                        if (confirmado) {
                            ejecutarMarcarTodosPresentes(true);
                        } else {
                            ejecutarMarcarTodosPresentes(false);
                        }
                    }
                );
            } else {
                ejecutarMarcarTodosPresentes(false);
            }
        }

        function ejecutarMarcarTodosPresentes(forzarSobreescribir) {
            let marcados = 0;

            alumnos.forEach(a => {
                if (forzarSobreescribir || !a.estado) {
                    a.estado = 'P';
                    marcados++;
                }
            });

            renderizar();
            contar();

            const toast = document.getElementById('toast');
            if (toast) {
                toast.textContent = '✅ ' + marcados + ' alumnos marcados presentes';
                toast.style.background = '#4caf50';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            if (navigator.vibrate) navigator.vibrate(20);

            setTimeout(() => { marcandoTodos = false; }, 500);
        }

        // ==================== 📊 REPORTE SEMANAL/MENSUAL ====================
        function abrirReporte() {
            document.getElementById('modal-reporte').classList.add('show');
            // Setear fechas por defecto (última semana)
            const hoy = new Date();
            const hace7dias = new Date(hoy.getTime() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('reporte-hasta').value = hoy.toISOString().split('T')[0];
            document.getElementById('reporte-desde').value = hace7dias.toISOString().split('T')[0];
        }

        function cerrarModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        async function generarReporte() {
            const desde = document.getElementById('reporte-desde').value;
            const hasta = document.getElementById('reporte-hasta').value;

            if (!desde || !hasta) {
                tg.showAlert('Seleccioná fechas desde y hasta');
                return;
            }

            const g = document.getElementById('grado')?.value || '';
            const s = document.getElementById('seccion')?.value || '';

            try {
                document.getElementById('reporte-contenido').innerHTML = '<div class="loading">⏳ Generando reporte...</div>';

                // Obtener asistencia en rango de fechas
                const params = new URLSearchParams();
                params.append('desde', desde);
                params.append('hasta', hasta);
                if (g) params.append('grado', g);
                if (s) params.append('seccion', s);

                const r = await fetch(`${API}/asistencia/reporte?${params}`);
                const data = await r.json();
                reporteData = data;

                mostrarReporte(data);
            } catch (e) {
                document.getElementById('reporte-contenido').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
            }
        }

        function mostrarReporte(data) {
            if (!data || !data.length) {
                document.getElementById('reporte-contenido').innerHTML = '<div class="loading">No hay datos en este período</div>';
                return;
            }

            let html = '<table class="reporte-tabla"><thead><tr>';
            html += '<th>Alumno</th><th>P</th><th>A</th><th>T</th><th>J</th><th>E</th><th>%P</th>';
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                const total = row.P + row.A + row.T + row.J + row.E;
                const porcentaje = total > 0 ? Math.round((row.P / total) * 100) : 0;
                html += `<tr>
                    <td><strong>${row.nombre}</strong><br><small>${row.matricula}</small></td>
                    <td style="color:#4caf50">${row.P}</td>
                    <td style="color:#f44336">${row.A}</td>
                    <td style="color:#ff9800">${row.T}</td>
                    <td style="color:#2196f3">${row.J}</td>
                    <td style="color:#9c27b0">${row.E}</td>
                    <td><strong>${porcentaje}%</strong>
                        <div class="estadistica-bar">
                            <div class="est-p" style="width:${row.P/total*100}%"></div>
                            <div class="est-a" style="width:${row.A/total*100}%"></div>
                            <div class="est-t" style="width:${row.T/total*100}%"></div>
                            <div class="est-j" style="width:${row.J/total*100}%"></div>
                            <div class="est-e" style="width:${row.E/total*100}%"></div>
                        </div>
                    </td>
                </tr>`;
            });

            html += '</tbody></table>';
            document.getElementById('reporte-contenido').innerHTML = html;
        }

        // ==================== 📥 EXPORTAR CSV ====================
        function exportarCSV() {
            if (!reporteData || !reporteData.length) {
                tg.showAlert('Primero generá el reporte');
                return;
            }

            const desde = document.getElementById('reporte-desde').value;
            const hasta = document.getElementById('reporte-hasta').value;

            // 1. Construimos el contenido del CSV
            let csv = 'Alumno,Matricula,Presentes,Ausentes,Tardanzas,Justificados,Excursiones,Total,Dias,\n';

            reporteData.forEach(row => {
                const total = row.P + row.A + row.T + row.J + row.E;
                csv += `"${row.nombre}",${row.matricula},${row.P},${row.A},${row.T},${row.J},${row.E},${total},${row.dias}\n`;
            });

            // 2. CREAMOS EL ARCHIVO (Todo esto debe ir DENTRO de la función)
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            
            // 3. Descargamos el archivo
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `reporte_${desde}_al_${hasta}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } // <--- LA LLAVE DE CIERRE VA AQUÍ, AL FINAL DE TODO

        // ==================== 📝 JUSTIFICACIÓN CON NOTA Y FOTO ====================
        function abrirJustificacion(alumnoId) {
            const alumno = alumnos.find(a => a.id === alumnoId);
            if (!alumno) return;

            alumnoJustificacionId = alumnoId;
            document.getElementById('justificacion-alumno').textContent = alumno.nombre + ' ' + (alumno.apellido_paterno || '');
            document.getElementById('justificacion-nota').value = '';
            document.getElementById('justificacion-preview').innerHTML = '';
            document.getElementById('justificacion-archivo').value = '';

            document.getElementById('modal-justificacion').classList.add('show');
        }

        function previewArchivo(input) {
            const preview = document.getElementById('justificacion-preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = '<img src="' + e.target.result + '" class="adjunto-preview">';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function guardarJustificacion() {
            const nota = document.getElementById('justificacion-nota').value.trim();
            const archivoInput = document.getElementById('justificacion-archivo');

            if (!nota && !archivoInput.files.length) {
                tg.showAlert('Agregá una nota o adjuntá una foto');
                return;
            }

            const formData = new FormData();
            formData.append('alumno_id', alumnoJustificacionId);
            formData.append('fecha', fechaSel);
            formData.append('nota', nota);
            if (archivoInput.files.length) {
                formData.append('archivo', archivoInput.files[0]);
            }

            try {
                const r = await fetch(`${API}/asistencia/justificacion`, {
                    method: 'POST',
                    body: formData
                });
                const d = await r.json();

                if (d.success) {
                    tg.showAlert('✅ Justificación guardada');
                    cerrarModal('modal-justificacion');
                } else {
                    tg.showAlert('❌ Error: ' + d.message);
                }
            } catch (e) {
                tg.showAlert('Error guardando: ' + e.message);
            }
        }

        // ==================== 📱 QR SCANNER ====================
        let qrStream = null;

        async function abrirQRScanner() {
            const overlay = document.getElementById('qr-scanner');
            const video = document.getElementById('qr-video');

            try {
                qrStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = qrStream;
                overlay.classList.add('show');

                // Simular escaneo (en producción usar librería como jsQR)
                tg.showAlert('📷 Escaneá el QR del alumno\n\n(En esta versión, ingresá la matrícula manualmente)');

                // Cerrar automáticamente después de 30 segundos
                setTimeout(() => cerrarQR(), 30000);
            } catch (e) {
                tg.showAlert('No se pudo acceder a la cámara: ' + e.message);
            }
        }

        function cerrarQR() {
            const overlay = document.getElementById('qr-scanner');
            overlay.classList.remove('show');
            if (qrStream) {
                qrStream.getTracks().forEach(track => track.stop());
                qrStream = null;
            }
        }

        function procesarQR(matricula) {
            // Buscar alumno por matrícula
            const alumno = alumnos.find(a => a.matricula === matricula);
            if (!alumno) {
                tg.showAlert('Alumno no encontrado: ' + matricula);
                return;
            }

            // Marcar como presente
            alumno.estado = 'P';
            renderizar();
            contar();

            tg.showAlert('✅ ' + alumno.nombre + ' marcado Presente');
            cerrarQR();
        }

        // ==================== INICIAR ====================
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
