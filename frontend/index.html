    <script>
        window.addEventListener('error', function(e) {
            const b = document.getElementById('modo-badge');
            if(b) b.textContent = '🔴 Error JS';
            const l = document.getElementById('lista');
            if(l) l.innerHTML = '<div class="error-msg"><b>Error de Código:</b><br>' + e.message + '</div>';
        });
        window.addEventListener('unhandledrejection', function(e) {
            const b = document.getElementById('modo-badge');
            if(b) b.textContent = '🔴 Promesa Rota';
            const l = document.getElementById('lista');
            if(l) l.innerHTML = '<div class="error-msg"><b>Error de Red/API:</b><br>' + (e.reason || 'Desconocido') + '</div>';
        });
    </script>

<body>
    <div class="app">
        <header class="header">
            <div class="status-bar">
                <span id="hora">--:--</span>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button onclick="abrirQRScanner()" style="background:rgba(255,255,255,0.25);border:none;color:white;padding:4px 10px;border-radius:10px;font-size:0.7rem;cursor:pointer;font-weight:600;">📷 QR</button>
                    <button onclick="abrirModalAlumno()" style="background:rgba(255,255,255,0.25);border:none;color:white;padding:4px 10px;border-radius:10px;font-size:0.7rem;cursor:pointer;font-weight:600;" id="btn-agregar-alumno-header">➕ Alumno</button>
                    <select id="idioma-select" class="idioma-select">
                        <option value="es">🇪🇸 Español</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="pt">🇵🇹 Português</option>
                        <option value="th">🇹🇭 ไทย</option>
                    </select>
                    <span id="modo-badge" class="modo-badge">🟡 Conectando...</span>
                </div>
            </div>
            <h1 id="app-title">📚 Control de Asistencia</h1>
            <div class="fecha" id="fecha-display">Cargando...</div>
        </header>
        <div class="fecha-selector">
            <label id="label-fecha">📅 Fecha de asistencia</label>
            <div class="fecha-row">
                <input type="date" id="fecha-input">
                <button class="btn-hoy" id="btn-hoy" onclick="irAHoy()">Hoy</button>
            </div>
            <div class="solo-lectura" id="solo-lectura">👁️ Solo lectura</div>
        </div>
        <div class="filtros">
            <select id="grado"><option value="">Todos los grados</option></select>
            <select id="seccion"><option value="">Todas</option></select>
            <button class="btn-cargar" id="btn-cargar" onclick="cargar()">Cargar</button>
        </div>
        <div class="busqueda-bar" id="busqueda-container" style="display:none;">
            <input type="text" id="busqueda-input" placeholder="🔍 Buscar alumno..." autocomplete="off">
            <button id="btn-todos-presentes" class="btn-todos-p">✅ Todos</button>
        </div>
        <div class="contador">
            <div><span class="num presente" id="c-p">0</span><span class="label" id="label-p">Presentes</span></div>
            <div><span class="num ausente" id="c-a">0</span><span class="label" id="label-a">Ausentes</span></div>
            <div><span class="num tardanza" id="c-t">0</span><span class="label" id="label-t">Tardanzas</span></div>
            <div><span class="num justificado" id="c-j">0</span><span class="label" id="label-j">Justificado</span></div>
            <div><span class="num excursion" id="c-e">0</span><span class="label" id="label-e">Excursión</span></div>
            <div><span class="num pendiente" id="c-pend">0</span><span class="label" id="label-pend">Pendientes</span></div>
        </div>
        <div class="lista" id="lista"><div class="loading">Seleccioná grado/sección y tocá "Cargar"</div></div>
        <div class="acciones">
            <button class="btn-guardar" id="btn-guardar" onclick="guardar()">💾 Guardar</button>
            <button class="btn-stats" id="btn-stats" onclick="abrirReporte()">📊 Stats</button>
        </div>
        <div class="toast" id="toast"></div>
    </div>

    <div class="modal-overlay" id="modal-reporte">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-reporte-title">📊 Reporte de Asistencia</h2>
                <button class="modal-close" onclick="cerrarModal('modal-reporte')">✕</button>
            </div>
            <div class="modal-body">
                <div class="reporte-filtros">
                    <input type="date" id="reporte-desde" placeholder="Desde">
                    <input type="date" id="reporte-hasta" placeholder="Hasta">
                </div>
                <button class="btn-modal" id="btn-generar-reporte" style="background: #667eea; color: white;" onclick="generarReporte()">Generar Reporte</button>
                <button class="btn-modal btn-exportar-csv" id="btn-exportar-csv" onclick="exportarCSV()">📄 Descargar CSV</button>
                <button class="btn-modal btn-exportar-pdf" id="btn-exportar-pdf" onclick="exportarPDF()">📕 Descargar PDF</button>
                <button class="btn-modal btn-exportar-excel" id="btn-exportar-excel" onclick="exportarExcel()">📗 Descargar Excel</button>
                <div id="reporte-contenido"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-justificacion">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-justificacion-titulo">📝 Justificación</h2>
                <button class="modal-close" onclick="cerrarModal('modal-justificacion')">✕</button>
            </div>
            <div class="modal-body">
                <p id="justificacion-alumno" style="margin-bottom:12px;font-weight:700;"></p>
                <textarea id="justificacion-nota" placeholder="Motivo de la justificación..." style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-family:inherit;min-height:80px;resize:vertical;"></textarea>
                <input type="file" id="justificacion-archivo" class="justificacion-input" accept="image/*" capture="camera" onchange="previewArchivo(this)">
                <button class="btn-adjuntar" id="btn-adjuntar-foto" onclick="document.getElementById('justificacion-archivo').click()">📷 Adjuntar foto</button>
                <div id="justificacion-preview"></div>
                <div id="justificacion-info" class="justificacion-info" style="display:none;"></div>
                <button class="btn-modal" id="btn-guardar-justificacion" onclick="guardarJustificacion()">Guardar Justificación</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-alumno">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-alumno-titulo">➕ Agregar Alumno</h2>
                <button class="modal-close" onclick="cerrarModal('modal-alumno')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="alumno-nombre" placeholder="Ej: Juan">
                </div>
                <div class="form-group">
                    <label>Apellido Paterno</label>
                    <input type="text" id="alumno-apellido-paterno" placeholder="Ej: Pérez">
                </div>
                <div class="form-group">
                    <label>Apellido Materno</label>
                    <input type="text" id="alumno-apellido-materno" placeholder="Ej: García">
                </div>
                <div class="form-group">
                    <label>Matrícula</label>
                    <input type="text" id="alumno-matricula" placeholder="Ej: 1001">
                </div>
                <div class="form-group">
                    <label>Grado</label>
                    <input type="text" id="alumno-grado" placeholder="Ej: 1ro, 2do, 3ro...">
                </div>
                <div class="form-group">
                    <label>Sección</label>
                    <input type="text" id="alumno-seccion" placeholder="Ej: A, B, C...">
                </div>
                <button class="btn-modal btn-agregar-alumno" id="btn-guardar-alumno" onclick="guardarAlumno()">💾 Guardar Alumno</button>
            </div>
        </div>
    </div>

        function t(key, vars = {}) {
            let text = translations[currentLang]?.[key] || translations['es'][key] || key;
            for (let [k, v] of Object.entries(vars)) text = text.replace(`{${k}}`, v);
            return text;
        }

        function getEstadoLabel(cod) { 
            return translations[currentLang]?.estados?.[cod] || translations['es']?.estados?.[cod] || cod; 
        }

        function applyTranslations() {
            document.getElementById('app-title').textContent = t('app_title');
            document.getElementById('label-fecha').textContent = t('label_fecha');
            document.getElementById('btn-hoy').textContent = t('btn_hoy');
            document.getElementById('btn-cargar').textContent = t('btn_cargar');
            document.getElementById('busqueda-input').placeholder = t('busqueda_placeholder');
            document.getElementById('btn-todos-presentes').innerHTML = t('btn_todos');
            document.getElementById('label-p').textContent = t('label_p');
            document.getElementById('label-a').textContent = t('label_a');
            document.getElementById('label-t').textContent = t('label_t');
            document.getElementById('label-j').textContent = t('label_j');
            document.getElementById('label-e').textContent = t('label_e');
            document.getElementById('label-pend').textContent = t('label_pend');
            document.getElementById('btn-guardar').innerHTML = t('btn_guardar');
            document.getElementById('btn-stats').innerHTML = t('btn_stats');
            document.getElementById('modal-reporte-title').textContent = t('modal_reporte_title');
            document.getElementById('btn-generar-reporte').textContent = t('btn_generar_reporte');
            document.getElementById('btn-exportar-csv').innerHTML = t('btn_csv');
            document.getElementById('btn-exportar-pdf').innerHTML = t('btn_pdf');
            document.getElementById('btn-exportar-excel').innerHTML = t('btn_excel');
            document.getElementById('justificacion-nota').placeholder = t('justificacion_placeholder');
            document.getElementById('btn-adjuntar-foto').innerHTML = t('btn_adjuntar');
            if (justificacionExistente) document.getElementById('btn-guardar-justificacion').textContent = t('btn_cerrar_just');
            else document.getElementById('btn-guardar-justificacion').textContent = t('btn_guardar_just');
            document.getElementById('modal-alumno-titulo').textContent = t('modal_alumno_title');
            document.getElementById('btn-guardar-alumno').textContent = t('btn_guardar_alumno');
            const btnHeader = document.getElementById('btn-agregar-alumno-header');
            if (btnHeader) btnHeader.textContent = t('btn_agregar_alumno');
            const soloLectura = document.getElementById('solo-lectura');
            if (soloLectura.style.display === 'block') soloLectura.textContent = t('solo_lectura');
            const gradoSelect = document.getElementById('grado');
            const seccionSelect = document.getElementById('seccion');
            if (gradoSelect.options[0]) gradoSelect.options[0].text = t('todos_grados');
            if (seccionSelect.options[0]) seccionSelect.options[0].text = t('todas_secciones');
            for (let i = 1; i < seccionSelect.options.length; i++) {
                let val = seccionSelect.options[i].value;
                if (val) seccionSelect.options[i].text = t('seccion_prefix') + val;
            }
            if (alumnos.length > 0) renderizar();
        }

        function setLanguage(lang) { currentLang = lang; localStorage.setItem('app_lang', lang); applyTranslations(); }

        function init() {
            console.log('🚀 Iniciando Mini App...');
            const savedLang = localStorage.getItem('app_lang');
            if (savedLang && translations[savedLang]) currentLang = savedLang;
            document.getElementById('idioma-select').value = currentLang;
            document.getElementById('idioma-select').addEventListener('change', (e) => setLanguage(e.target.value));
            applyTranslations();
            tg.ready();
            tg.expand();
            actualizarHora();
            setInterval(actualizarHora, 1000);
            const inputFecha = document.getElementById('fecha-input');
            if (inputFecha) {
                inputFecha.value = fechaSel;
                inputFecha.addEventListener('change', function(e) { fechaSel = e.target.value; actualizarFecha(); cargar(); });
            }
            actualizarFecha();
            const busquedaInput = document.getElementById('busqueda-input');
            if (busquedaInput) busquedaInput.addEventListener('input', filtrarBusqueda);
            const btnTodosP = document.getElementById('btn-todos-presentes');
            if (btnTodosP) {
                btnTodosP.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); marcarTodosPresentes(); });
                btnTodosP.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); marcarTodosPresentes(); }, {passive: false});
            }
            auth().then(() => { verificarConexion(); cargarFiltros(); }).catch(() => { verificarConexion(); cargarFiltros(); });
        }

        function actualizarHora() { document.getElementById('hora').textContent = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}); }

        async function auth() {
            try {
                const initData = tg.initData || '';
                if (!initData) { user = {id: 0, first_name: 'Modo Dev', username: 'dev'}; return; }
                const r = await fetch(`${API}/auth`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({initData: initData}) });
                const d = await r.json();
                user = d.success ? d.user : {id: 0, first_name: 'Modo Dev', username: 'dev'};
            } catch (e) { user = {id: 0, first_name: 'Modo Dev', username: 'dev'}; }
        }

        async function verificarConexion() {
            try {
                const r = await fetch(`${API}/`);
                const d = await r.json();
                const badge = document.getElementById('modo-badge');
                if (badge) badge.textContent = (d.status === 'ok' || d.modo === 'online') ? t('online') : t('offline');
            } catch (e) { document.getElementById('modo-badge').textContent = t('sin_conexion'); }
        }

        function actualizarFecha() {
            const f = new Date(fechaSel + 'T00:00:00');
            document.getElementById('fecha-display').textContent = f.toLocaleDateString('es-ES', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
            const hoyStr = new Date().toISOString().split('T')[0];
            const badge = document.getElementById('solo-lectura');
            const btn = document.getElementById('btn-guardar');
            if (fechaSel === hoyStr) { badge.style.display = 'none'; btn.disabled = false; btn.innerHTML = t('btn_guardar'); }
            else if (fechaSel < hoyStr) { badge.style.display = 'block'; badge.textContent = t('solo_lectura'); btn.disabled = false; btn.innerHTML = t('btn_guardar'); }
            else { badge.style.display = 'block'; badge.textContent = t('futuro_no_permitido'); btn.disabled = true; btn.innerHTML = '🔒 ' + t('futuro_no_permitido'); }
        }

        function irAHoy() { fechaSel = new Date().toISOString().split('T')[0]; document.getElementById('fecha-input').value = fechaSel; actualizarFecha(); cargar(); }

        async function cargarFiltros() {
            try {
                const r = await fetch(`${API}/alumnos`);
                const data = await r.json();
                const grados = [...new Set(data.map(a => a.grado))].sort();
                const secciones = [...new Set(data.map(a => a.seccion))].sort();
                const sg = document.getElementById('grado');
                const ss = document.getElementById('seccion');
                sg.innerHTML = `<option value="">${t('todos_grados')}</option>`;
                ss.innerHTML = `<option value="">${t('todas_secciones')}</option>`;
                grados.forEach(g => sg.add(new Option(g, g)));
                secciones.forEach(s => ss.add(new Option(t('seccion_prefix') + s, s)));
            } catch (e) { console.error('Error filtros:', e); }
        }

        async function cargar() {
            const g = document.getElementById('grado')?.value || '';
            const s = document.getElementById('seccion')?.value || '';
            const lista = document.getElementById('lista');
            lista.innerHTML = `<div class="loading">${t('loading_alumnos')}</div>`;
            document.getElementById('busqueda-container').style.display = 'flex';
            try {
                const params = new URLSearchParams();
                if (g) params.append('grado', g);
                if (s) params.append('seccion', s);
                const al = await (await fetch(`${API}/alumnos?${params}`)).json();
                const ap = new URLSearchParams();
                ap.append('fecha', fechaSel);
                if (g) ap.append('grado', g);
                if (s) ap.append('seccion', s);
                const asis = await (await fetch(`${API}/asistencia/hoy?${ap}`)).json();
                const asisMap = {};
                (asis.asistencia || []).forEach(a => { asisMap[String(a.alumno_id)] = a.estado; });
                const jp = new URLSearchParams();
                jp.append('fecha', fechaSel);
                const justs = await (await fetch(`${API}/asistencia/justificacion?${jp}`)).json();
                justificacionesDelDia = {};
                (justs || []).forEach(j => { justificacionesDelDia[String(j.alumno_id)] = j; });
                alumnos = al.map(a => ({...a, estado: asisMap[String(a.id)] || null}));
                renderizar();
                contar();
            } catch (e) { mostrarError('Error: ' + e.message); }
        }

        function renderizar() {
            const container = document.getElementById('lista');
            if (!container) return;
            if (alumnos.length === 0) { container.innerHTML = `<div class="loading">${t('no_alumnos')}</div>`; return; }
            container.innerHTML = '';
            alumnos.forEach((a, i) => {
                const ini = (a.nombre[0] + (a.apellido_paterno || a.apellido || '')[0]).toUpperCase();
                const card = document.createElement('div');
                card.className = 'card' + (a.estado ? ' completo' : '');
                card.style.animationDelay = (i * 0.03) + 's';
                const header = document.createElement('div');
                header.className = 'card-header';

        function marcar(id, estado, btn) {
            const a = alumnos.find(x => x.id === id);
            if (!a) return;
            a.estado = estado;
            const card = btn.closest('.card');
            if (card) {
                card.querySelectorAll('.estados button').forEach(b => b.className = '');
                btn.classList.add(estado === 'P' ? 'sel-p' : estado === 'A' ? 'sel-a' : estado === 'T' ? 'sel-t' : estado === 'J' ? 'sel-j' : 'sel-e');
                card.classList.add('completo');
            }
            contar();
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function contar() {
            const p = alumnos.filter(a => a.estado === 'P').length;
            const au = alumnos.filter(a => a.estado === 'A').length;
            const t = alumnos.filter(a => a.estado === 'T').length;
            const j = alumnos.filter(a => a.estado === 'J').length;
            const e = alumnos.filter(a => a.estado === 'E').length;
            const pend = alumnos.filter(a => !a.estado).length;
            document.getElementById('c-p').textContent = p;
            document.getElementById('c-a').textContent = au;
            document.getElementById('c-t').textContent = t;
            document.getElementById('c-j').textContent = j;
            document.getElementById('c-e').textContent = e;
            document.getElementById('c-pend').textContent = pend;
        }

        async function guardar() {
            const regs = alumnos.filter(a => a.estado).map(a => ({
                alumno_id: String(a.id), fecha: fechaSel, estado: a.estado,
                hora: new Date().toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'}),
                user_id: user?.id || 0
            }));
            if (!regs.length) { tg.showAlert(t('sin_asistencia')); return; }
            const btn = document.getElementById('btn-guardar');
            const orig = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = t('guardando');
            try {
                const r = await fetch(`${API}/asistencia/registrar`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({registros: regs, user_id: user?.id || 0}) });
                const d = await r.json();
                const toast = document.getElementById('toast');
                if (toast) { toast.textContent = d.modo === 'online' ? t('exito_guardado', {n: d.registros}) : `💾 ${d.mensaje||'Guardado'}`; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }
                if (d.success) setTimeout(() => cargar(), 500);
                else tg.showAlert(t('error_guardar') + (d.detail || ''));
            } catch (e) { tg.showAlert(t('error_guardar') + e.message); }
            finally { btn.disabled = false; btn.innerHTML = orig; }
        }

        let marcandoTodos = false;
        function marcarTodosPresentes() {
            if (marcandoTodos) return;
            marcandoTodos = true;
            const hoyStr = new Date().toISOString().split('T')[0];
            if (fechaSel > hoyStr) { tg.showAlert(t('futuro_no_permitido')); marcandoTodos = false; return; }
            const yaMarcados = alumnos.filter(a => a.estado).length;
            const pendientes = alumnos.filter(a => !a.estado).length;
            if (yaMarcados > 0 && pendientes === 0) {
                tg.showConfirm(t('confirm_sobreescribir_todos', {n: yaMarcados}), (confirmado) => { if (confirmado) ejecutarMarcarTodosPresentes(true); else marcandoTodos = false; });
            } else if (yaMarcados > 0 && pendientes > 0) {
                tg.showConfirm(t('confirm_marcar_pendientes', {m: yaMarcados, p: pendientes}), (confirmado) => { if (confirmado) ejecutarMarcarTodosPresentes(true); else ejecutarMarcarTodosPresentes(false); });
            } else ejecutarMarcarTodosPresentes(false);
        }

        function ejecutarMarcarTodosPresentes(forzarSobreescribir) {
            let marcados = 0;
            alumnos.forEach(a => { if (forzarSobreescribir || !a.estado) { a.estado = 'P'; marcados++; } });
            renderizar(); contar();
            const toast = document.getElementById('toast');
            if (toast) { toast.textContent = `✅ ${marcados} ${t('label_p')}`; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }
            if (navigator.vibrate) navigator.vibrate(20);
            setTimeout(() => { marcandoTodos = false; }, 500);
        }

        // ==================== FUNCIÓN DE DESCARGA DEFINITIVA (funciona en todas las plataformas) ====================
                async function descargarArchivoTelegram(blob, nombreArchivo, mimeType) {
            const isTelegramWebView = !!(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData);

            // Estrategia 0: Subir a backend y abrir URL publica (funciona en Telegram WebView, Android, iOS, Desktop)
            if (isTelegramWebView) {
                try {
                    const formData = new FormData();
                    formData.append('archivo', blob, nombreArchivo);

                    const r = await fetch(`${API}/upload-temp`, {
                        method: 'POST',
                        body: formData
                    });

                    if (r.ok) {
                        const data = await r.json();
                        if (data.url) {
                            tg.openLink(data.url, { try_instant_view: false });
                            console.log('✅ Descarga via backend URL:', data.url);
                            return true;
                        }
                    }
                } catch (e) {
                    console.warn('❌ Estrategia backend fallo:', e);
                }
            }

            // Estrategia 1: URL.createObjectURL + anchor click (navegadores normales)
            try {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = nombreArchivo;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                console.log('✅ Descarga via blob URL:', nombreArchivo);
                return true;
            } catch (e) {
                console.warn('❌ Estrategia blob fallo:', e);
            }

            // Estrategia 2: Telegram openLink con blob URL
            try {
                const url = URL.createObjectURL(blob);
                if (tg && tg.openLink) {
                    tg.openLink(url, { try_instant_view: false });
                    console.log('✅ Descarga via tg.openLink blob:', nombreArchivo);
                    return true;
                }
            } catch (e) {
                console.warn('❌ Estrategia tg.openLink fallo:', e);
            }

            // Estrategia 3: Convertir a base64 y usar data URI
            try {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dataUrl = e.target.result;
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = nombreArchivo;
                    a.target = '_blank';
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => {
                        document.body.removeChild(a);
                    }, 100);
                };
                reader.readAsDataURL(blob);
                console.log('✅ Descarga via data URL:', nombreArchivo);
                return true;
            } catch (e) {
                console.warn('❌ Estrategia data URL fallo:', e);
            }

            tg.showAlert('No se pudo descargar el archivo. Proba desde un navegador externo.');
            return false;
        }

        async function exportarExcel() {
            if (!reporteData || !reporteData.length) { tg.showAlert('Primero generá el reporte'); return; }
            const desde = document.getElementById('reporte-desde').value;
            const hasta = document.getElementById('reporte-hasta').value;
            let justificacionesMap = {};
            try {
                const params = new URLSearchParams();
                params.append('desde', desde); params.append('hasta', hasta);
                const r = await fetch(`${API}/asistencia/justificacion?${params}`);
                const justData = await r.json();
                justData.forEach(j => { if (!justificacionesMap[j.alumno_id]) justificacionesMap[j.alumno_id] = []; justificacionesMap[j.alumno_id].push(j); });
            } catch (e) { console.warn('No se pudieron cargar justificaciones:', e); }
            const excelData = reporteData.map(row => {
                const total = row.P + row.A + row.T + row.J + row.E;
                const porcentaje = total > 0 ? Math.round((row.P / total) * 100) : 0;
                const justs = justificacionesMap[row.id] || [];
                const linksImagenes = justs.filter(j => j.archivo_url).map(j => `${SUPABASE_URL}/storage/v1/object/public/justificaciones/${j.archivo_url}`).join('\n');
                const notas = justs.map(j => j.nota || '').filter(n => n).join(' | ');
                return {
                    'Alumno': row.nombre, 'Matricula': row.matricula, 'Grado': row.grado, 'Seccion': row.seccion,
                    'Presentes': row.P, 'Ausentes': row.A, 'Tardanzas': row.T, 'Justificados': row.J, 'Excursiones': row.E,
                    'Total': total, 'Dias': row.dias, '% Asistencia': porcentaje + '%',
                    'Notas Justificacion': notas, 'Links Imagenes': linksImagenes
                };
            });
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(excelData);
            ws['!cols'] = [{ wch: 30 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 12 }, { wch: 8 }, { wch: 8 }, { wch: 12 }, { wch: 40 }, { wch: 60 }];
            const range = XLSX.utils.decode_range(ws['!ref']);
            const linksCol = 13;
            for (let R = range.s.r + 1; R <= range.e.r; ++R) {
                const cellAddress = XLSX.utils.encode_cell({ r: R, c: linksCol });
                const cell = ws[cellAddress];
                if (cell && cell.v && cell.v.includes('http')) {
                    const links = cell.v.split('\n').filter(l => l.trim());
                    if (links.length > 0) { cell.l = { Target: links[0] }; cell.v = links.length > 1 ? `${links[0]} (+${links.length - 1} más)` : links[0]; }
                }
            }
            XLSX.utils.book_append_sheet(wb, ws, 'Asistencia');
            const resumenData = [
                { 'Metrica': 'Total Alumnos', 'Valor': reporteData.length },
                { 'Metrica': 'Total Presentes', 'Valor': reporteData.reduce((a, b) => a + b.P, 0) },
                { 'Metrica': 'Total Ausentes', 'Valor': reporteData.reduce((a, b) => a + b.A, 0) },
                { 'Metrica': 'Total Tardanzas', 'Valor': reporteData.reduce((a, b) => a + b.T, 0) },
                { 'Metrica': 'Total Justificados', 'Valor': reporteData.reduce((a, b) => a + b.J, 0) },
                { 'Metrica': 'Total Excursiones', 'Valor': reporteData.reduce((a, b) => a + b.E, 0) },
                { 'Metrica': 'Período', 'Valor': `${desde} al ${hasta}` },
                { 'Metrica': 'Generado', 'Valor': new Date().toLocaleString('es-ES') }
            ];
            const wsResumen = XLSX.utils.json_to_sheet(resumenData);
            wsResumen['!cols'] = [{ wch: 25 }, { wch: 20 }];
            XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen');
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const excelBlob = new Blob([wbout], { type: 'application/octet-stream' });
            descargarArchivoTelegram(excelBlob, `reporte_asistencia_${desde}_al_${hasta}.xlsx`);
        }

            } catch (e) { return null; }
        }

        async function abrirJustificacion(alumnoId) {
            const alumno = alumnos.find(a => a.id === alumnoId);
            if (!alumno) return;
            alumnoJustificacionId = alumnoId;
            const existente = await cargarJustificacionExistente(alumnoId);
            justificacionExistente = existente;
            document.getElementById('justificacion-alumno').textContent = alumno.nombre + ' ' + (alumno.apellido_paterno || '');
            const notaInput = document.getElementById('justificacion-nota');
            const previewDiv = document.getElementById('justificacion-preview');
            const archivoInput = document.getElementById('justificacion-archivo');
            const infoDiv = document.getElementById('justificacion-info');
            const btnAdjuntar = document.getElementById('btn-adjuntar-foto');
            const btnGuardar = document.getElementById('btn-guardar-justificacion');
            const titulo = document.getElementById('modal-justificacion-titulo');
            notaInput.value = ''; previewDiv.innerHTML = ''; archivoInput.value = ''; infoDiv.style.display = 'none';
            if (existente) {
                titulo.textContent = t('modal_justificacion_title_view');
                notaInput.value = existente.nota || ''; notaInput.readOnly = true; notaInput.style.background = '#f5f5f5';
                infoDiv.style.display = 'block';
                infoDiv.innerHTML = `<strong>📅 Guardado:</strong> ${new Date(existente.created_at).toLocaleString('es-ES')}<br><strong>👤 Por:</strong> Usuario #${existente.user_id || 'desconocido'}`;
                if (existente.archivo_url) {
                    const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/justificaciones/${existente.archivo_url}`;
                    previewDiv.innerHTML = `<div style="margin:10px 0;"><img src="${imageUrl}" class="adjunto-preview" onclick="window.open('${imageUrl}','_blank')" style="cursor:pointer;max-width:100%;border-radius:8px;"><p style="font-size:0.75rem;color:#888;margin-top:6px;text-align:center;">👆 Tocá la imagen para ver en tamaño completo</p></div>`;
                } else previewDiv.innerHTML = '<p style="color:#888;font-size:0.85rem;text-align:center;padding:10px;">📝 Solo nota de texto, sin imagen adjunta</p>';
                btnAdjuntar.style.display = 'none';
                btnGuardar.textContent = t('btn_cerrar_just');
                btnGuardar.onclick = () => cerrarModal('modal-justificacion');
            } else {
                titulo.textContent = t('modal_justificacion_title_new');
                notaInput.readOnly = false; notaInput.style.background = 'white'; notaInput.placeholder = t('justificacion_placeholder');
                btnAdjuntar.style.display = 'inline-block';
                btnGuardar.textContent = t('btn_guardar_just');
                btnGuardar.onclick = guardarJustificacion;
            }
            document.getElementById('modal-justificacion').classList.add('show');
        }

        function previewArchivo(input) {
            const preview = document.getElementById('justificacion-preview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { preview.innerHTML = '<img src="' + e.target.result + '" class="adjunto-preview" style="max-width:100%;border-radius:8px;">'; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function guardarJustificacion() {
            const nota = document.getElementById('justificacion-nota').value.trim();
            const archivoInput = document.getElementById('justificacion-archivo');
            if (!nota && !archivoInput.files.length) { tg.showAlert(t('justificacion_sin_nota')); return; }
            const formData = new FormData();
            formData.append('alumno_id', alumnoJustificacionId);
            formData.append('fecha', fechaSel);
            formData.append('nota', nota || 'Sin nota');
            if (archivoInput.files.length) formData.append('archivo', archivoInput.files[0]);
            const btnGuardar = document.getElementById('btn-guardar-justificacion');
            const textoOriginal = btnGuardar.textContent;
            btnGuardar.textContent = t('guardando'); btnGuardar.disabled = true;
            try {
                const r = await fetch(`${API}/asistencia/justificacion`, { method: 'POST', body: formData });
                let d;
                if (r.headers.get('content-type')?.includes('application/json')) d = await r.json();
                else throw new Error('Error en el servidor');
                if (r.ok && d.success) {
                    justificacionesDelDia[String(alumnoJustificacionId)] = { alumno_id: alumnoJustificacionId, fecha: fechaSel, nota: nota, archivo_url: d.data?.[0]?.archivo_url || null, created_at: new Date().toISOString() };
                    renderizar();
                    tg.showAlert(t('justificacion_guardada'));
                    cerrarModal('modal-justificacion');
                } else tg.showAlert(t('error_justificacion') + (d.detail || d.message || ''));
            } catch (e) { tg.showAlert(t('error_justificacion') + e.message); }
            finally { btnGuardar.textContent = textoOriginal; btnGuardar.disabled = false; }
        }

        // ==================== AGREGAR ALUMNO ====================
        function abrirModalAlumno() {
            alumnoEditandoId = null;
            document.getElementById('modal-alumno').classList.add('show');
            document.getElementById('modal-alumno-titulo').textContent = t('modal_alumno_title');
            document.getElementById('btn-guardar-alumno').textContent = t('btn_guardar_alumno');
            document.getElementById('btn-guardar-alumno').onclick = guardarAlumno;
            // Actualizar placeholders con traducciones
            document.getElementById('alumno-nombre').placeholder = t('alumno_nombre');
            document.getElementById('alumno-apellido-paterno').placeholder = t('alumno_apellido_paterno');
            document.getElementById('alumno-apellido-materno').placeholder = t('alumno_apellido_materno');
            document.getElementById('alumno-matricula').placeholder = t('alumno_matricula');
            document.getElementById('alumno-grado').placeholder = t('alumno_grado');
            document.getElementById('alumno-seccion').placeholder = t('alumno_seccion');
        }

        async function guardarAlumno() {
            const nombre = document.getElementById('alumno-nombre').value.trim();
            const apellidoPaterno = document.getElementById('alumno-apellido-paterno').value.trim();
            const apellidoMaterno = document.getElementById('alumno-apellido-materno').value.trim();
            const matricula = document.getElementById('alumno-matricula').value.trim();
            const grado = document.getElementById('alumno-grado').value.trim();
            const seccion = document.getElementById('alumno-seccion').value.trim();

            if (!nombre || !matricula || !grado || !seccion) {
                tg.showAlert('Completa nombre, matrícula, grado y sección');
                return;
            }

            const btn = document.getElementById('btn-guardar-alumno');
            const orig = btn.textContent;
            btn.disabled = true; btn.textContent = t('guardando');

            try {
                const formData = new FormData();
                formData.append('nombre', nombre);
                formData.append('apellido_paterno', apellidoPaterno);
                formData.append('apellido_materno', apellidoMaterno);
                formData.append('matricula', matricula);
                formData.append('grado', grado);
                formData.append('seccion', seccion);

                const r = await fetch(`${API}/alumnos`, { method: 'POST', body: formData });
                const d = await r.json();

                if (r.ok && d.success) {
                    tg.showAlert(t('alumno_exito'));
                    cerrarModal('modal-alumno');
                    // Limpiar formulario
                    document.getElementById('alumno-nombre').value = '';
                    document.getElementById('alumno-apellido-paterno').value = '';
                    document.getElementById('alumno-apellido-materno').value = '';
                    document.getElementById('alumno-matricula').value = '';
                    document.getElementById('alumno-grado').value = '';
                    document.getElementById('alumno-seccion').value = '';
                    // Recargar filtros para que aparezca el nuevo grado/sección
                    cargarFiltros();
                } else {
                    const msg = d.detail || d.message || '';
                    if (r.status === 409) tg.showAlert(t('alumno_matricula_existe'));
                    else tg.showAlert(t('alumno_error') + msg);
                }
            } catch (e) {
                tg.showAlert(t('alumno_error') + e.message);
            } finally {
                btn.disabled = false; btn.textContent = orig;
            }
        }

        // ==================== CRUD ALUMNOS ====================
        function abrirModalEditarAlumno(alumno) {
            alumnoEditandoId = alumno.id;
            document.getElementById('modal-alumno').classList.add('show');
            document.getElementById('modal-alumno-titulo').textContent = t('alumno_editar');
            document.getElementById('btn-guardar-alumno').textContent = t('alumno_guardar_cambios');
            document.getElementById('btn-guardar-alumno').onclick = guardarCambiosAlumno;

            document.getElementById('alumno-nombre').value = alumno.nombre || '';
            document.getElementById('alumno-apellido-paterno').value = alumno.apellido_paterno || '';
            document.getElementById('alumno-apellido-materno').value = alumno.apellido_materno || '';
            document.getElementById('alumno-matricula').value = alumno.matricula || '';
            document.getElementById('alumno-grado').value = alumno.grado || '';
            document.getElementById('alumno-seccion').value = alumno.seccion || '';

            document.getElementById('alumno-nombre').placeholder = t('alumno_nombre');
            document.getElementById('alumno-apellido-paterno').placeholder = t('alumno_apellido_paterno');
            document.getElementById('alumno-apellido-materno').placeholder = t('alumno_apellido_materno');
            document.getElementById('alumno-matricula').placeholder = t('alumno_matricula');
            document.getElementById('alumno-grado').placeholder = t('alumno_grado');
            document.getElementById('alumno-seccion').placeholder = t('alumno_seccion');
        }

        async function guardarCambiosAlumno() {
            if (!alumnoEditandoId) return;

            const nombre = document.getElementById('alumno-nombre').value.trim();
            const apellidoPaterno = document.getElementById('alumno-apellido-paterno').value.trim();
            const apellidoMaterno = document.getElementById('alumno-apellido-materno').value.trim();
            const matricula = document.getElementById('alumno-matricula').value.trim();
            const grado = document.getElementById('alumno-grado').value.trim();
            const seccion = document.getElementById('alumno-seccion').value.trim();

            if (!nombre || !matricula || !grado || !seccion) {
                tg.showAlert('Completa nombre, matrícula, grado y sección');
                return;
            }

            const btn = document.getElementById('btn-guardar-alumno');
            const orig = btn.textContent;
            btn.disabled = true; btn.textContent = t('guardando');

            try {
                const formData = new FormData();
                formData.append('nombre', nombre);
                formData.append('apellido_paterno', apellidoPaterno);
                formData.append('apellido_materno', apellidoMaterno);
                formData.append('matricula', matricula);
                formData.append('grado', grado);
                formData.append('seccion', seccion);

                const r = await fetch(`${API}/alumnos/${alumnoEditandoId}`, { method: 'PUT', body: formData });
                const d = await r.json();

                if (r.ok && d.success) {
                    tg.showAlert(t('alumno_exito'));
                    cerrarModal('modal-alumno');
                    alumnoEditandoId = null;
                    document.getElementById('btn-guardar-alumno').onclick = guardarAlumno;
                    cargarFiltros();
                    cargar();
                } else {
                    const msg = d.detail || d.message || '';
                    if (r.status === 409) tg.showAlert(t('alumno_matricula_existe'));
                    else tg.showAlert(t('alumno_error') + msg);
                }
            } catch (e) {
                tg.showAlert(t('alumno_error') + e.message);
            } finally {
                btn.disabled = false; btn.textContent = orig;
            }
        }

        function confirmarEliminarAlumno(alumno) {
            tg.showConfirm(t('alumno_confirmar_eliminar', {nombre: alumno.nombre}), (confirmado) => {
                if (confirmado) eliminarAlumno(alumno.id);
            });
        }

        async function eliminarAlumno(alumnoId) {
            try {
                const r = await fetch(`${API}/alumnos/${alumnoId}`, { method: 'DELETE' });
                const d = await r.json();

                if (r.ok && d.success) {
                    tg.showAlert(t('alumno_eliminado'));
                    cargarFiltros();
                    cargar();
                } else {
                    const msg = d.detail || '';
                    if (msg.includes('asistencia')) tg.showAlert(t('alumno_tiene_asistencia'));
                    else if (msg.includes('justificaciones')) tg.showAlert(t('alumno_tiene_justificaciones'));
                    else tg.showAlert(t('alumno_error') + msg);
                }
            } catch (e) {
                tg.showAlert(t('alumno_error') + e.message);
            }
        }

        // ==================== QR SCANNER ====================
        function abrirQRScanner() {
            if (typeof tg !== 'undefined' && tg.openScanQrPopup) {
                tg.openScanQrPopup({ text: 'Escanea el QR del alumno' }, (text) => { if (text && text.trim()) procesarQR(text); });
            } else if (typeof tg !== 'undefined' && tg.showScanQrPopup) {
                tg.showScanQrPopup({ text: 'Escanea el QR del alumno' }, (text) => { if (text && text.trim()) { procesarQR(text); return true; } return false; });
            } else {
                const matricula = prompt(t('qr_no_soportado') + '\nIngrese la matrícula manualmente:');
                if (matricula && matricula.trim()) procesarQR(matricula.trim());
            }
        }

        function procesarQR(textoQR) {
            const matricula = textoQR.replace(/MAT[:|]?/i, '').trim();
            const alumno = alumnos.find(a => a.matricula === matricula);
            if (!alumno) { tg.showAlert(t('qr_alumno_no_encontrado') + matricula); return; }
            alumno.estado = 'P';
            renderizar();
            contar();
            tg.showAlert(t('qr_marcado', {nombre: alumno.nombre + ' ' + (alumno.apellido_paterno || '')}));
            if (navigator.vibrate) navigator.vibrate(50);
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>
</html>
